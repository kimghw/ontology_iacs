# --- 수식/LaTeX 조각 ---
latex_fragments:
  description: "수식 표기 잔해 — LanguageTool이 인식 불가"
  exact:
    - "Y$"
    - "y$"
    - eH
    - "e$"
    - "x$"
    - "a$"
    - "r$"
    - "m$"
    - "s$"
    - "$$D"
    - "y$$"
    - "$Q"
    - "$n$"
    - "$I$"
    - "$Q$"
    - sqrt
    - geq
    - leq
    - theta_s
    - theta_m
    - Tmax
  pattern:
    - '^\$+'            # $ 로 시작하는 수식 토큰
    - '\$+$'            # $ 로 끝나는 수식 토큰

# --- 단위 기호 ---
unit_symbols:
  description: "SI/공학 단위 기호"
  exact:
    - "dBµV"
    - kN
    - kPa
    - kVA
    - "MΩ"
    - "µs"
    - "min·m"
    - kgf
    - rms
    - cr
  pattern:
    - '^[kKMGTµm]?[A-Z][a-z]?$'   # 단위 패턴 (kPa, MΩ 등)

# --- IT/사이버 보안 용어 ---
it_cyber_terms:
  description: "IT/사이버 보안 분야 기술 용어"
  exact:
    - DoS
    - wifi
    - antimalware
    - autorun
    - unicast
    - ipconfig
    - netstat
    - nmap
    - fieldbuses

# --- 방폭 등급 코드 ---
explosion_protection:
  description: "IEC 방폭 보호 유형 코드"
  exact:
    - Exi
    - Exd
    - Exe
    - Exs
    - Exn
  pattern:
    - '^Ex[a-z]$'       # Ex + 소문자 한 글자

# --- 마크다운 문법 ---
markdown_syntax:
  description: "마크다운 주석/지시문"
  exact:
    - "markdownlint-disable"
  pattern:
    - '^markdownlint-'

