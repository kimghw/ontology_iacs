# typo_whitelist.yaml
# LanguageTool 오탈자 검사 False Positive 화이트리스트
# pdf2md 스킬의 오탈자 검증 단계에서 이 목록에 해당하는 항목을 리포트에서 제거한다.
#
# 사용법:
#   python3 scripts/filter_typo_report.py <input_report.json> [--output <filtered.json>]
#
# 구조:
#   각 카테고리는 exact(정확 일치) 또는 pattern(정규식) 목록을 가진다.
#   exact: 대소문자 구분 일치 (text 필드와 비교)
#   pattern: 정규식 매칭 (text 필드에 re.search)
#   rules: LanguageTool 룰 ID 전체 무시

# --- 룰 단위 무시 ---
# 이 룰에 해당하는 항목은 전부 제거
ignored_rules:
  - WHITESPACE_RULE          # PDF 변환 공백 아티팩트 (이중/삼중 공백)
  - CONSECUTIVE_SPACES        # 연속 공백
  - COMMA_PARENTHESIS_WHITESPACE  # 구두점 앞 공백 ( , ) . ) — PDF 아티팩트
  - EN_WORD_COHERENCY         # 영국/미국식 혼용 — IACS 문서는 영국식 표준
  - DASH_RULE                 # " - " vs "–" — 기술 문서 스타일 선호도
  - EN_UNPAIRED_BRACKETS      # 짝 없는 괄호 — 수식/테이블 구조에서 오탐 잦음
  - EN_UNPAIRED_QUOTES        # 짝 없는 따옴표 — 수식/테이블에서 오탐
  - ENGLISH_WORD_REPEAT_BEGINNING_RULE  # 연속 동일 단어 시작 (F20, D3 등 섹션 번호)
  - SENTENCE_WHITESPACE       # 문장 사이 공백 — PDF 아티팩트
  - UPPERCASE_SENTENCE_START  # 문장 시작 대문자 — 목록/테이블 셀에서 오탐
  - LC_AFTER_PERIOD           # 마침표 뒤 소문자 (II, III 등 로마 숫자 오탐)
  - SO_AS_TO                  # "so as to" → "to" — 법률/규정 문체에서 정상
  - OUTSIDE_OF                # "outside of" — 기술 문서에서 관용적
  - IN_A_X_MANNER             # "in a X manner" → 부사 — 규정 문체에서 정상
  - WITH_THE_EXCEPTION_OF     # "with the exception of" — 규정 문체
  - COMMA_COMPOUND_SENTENCE_2 # ", and" / ", or" / ", so" — 스타일 선호도
  - POSSESSIVE_APOSTROPHE     # "systems" → "systems'" — 문맥 의존 오탐
  - A_UNCOUNTABLE             # "a severe damage" 등 — 해양 문서 관용적 용법
  - COMMA_PERIOD_CONFUSION    # 0,5% → 0.5% — 유럽식 소수점 표기 (ISO 표준)
  - DAMAGE_OF_TO              # "damage of" — 해양 규정에서 관용적
  - CONSEQUENCES_OF_FOR       # "consequences to" — 기술 문서 관용적
  - THE_SUPERLATIVE           # "Least privilege" 등 — 약어 문맥 오탐
  - COMMA_AFTER_A_MONTH       # "May, 1998" — 문서 원본 날짜 표기
  - ALL_OF_THE                # "all of the" — 규정 문체
  - SPURIOUS_APOSTROPHE       # "CBS's" 등 약어 소유격 — 정상
  - CONFUSION_DUE_DO          # "Due consideration" — 정상 영어
  - NEEDNT_TO_DO_AND_DONT_NEED_DO  # "to be" 관련 오탐
  - A_NNS                     # "a suitable means" — means는 단복수 동형
  - CD_NN                     # "ohm" 단수 — 단위는 문맥 의존
  - MAY_BE                    # "may be" vs "maybe" — 문맥 의존
  - ENGLISH_WORD_REPEAT_RULE  # "F38 F38" 등 — 섹션 번호 반복
  - EN_A_VS_AN                # "a/an" — 문맥 의존 오탐
  - CD_TH                     # "1 st" → "1st" — PDF 변환 아티팩트 (공백 삽입)
  - COMMA_COMPOUND_SENTENCE   # ", and" — 스타일 선호도

